<!DOCTYPE html>
<html>
    <body>
	<style>
	.font_1 {
	    background-color: black;
		color: yellow;
		font-size: large;
	}
	.din_2 {
	    background-color: black;
		color: yellow;
		font-size: large;
	}
	</style>
	<h2 class="font_1"> This h2 element is styled per class attribute font_1</h2>
	<h3 class="din_2"> This h3 element is styled per class attribute din_2</h3>
	<h4 class="font_1"> Even though this is an h4 element, it is styled the same
    as the h2 element because we pointed to the class attribute font_1</h4>
	
	<p class="din_2"> This paragraph is written in my style!</p>
    </body>	
</html>
